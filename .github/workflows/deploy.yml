name: Frontend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build --build-arg REACT_APP_API_URL=http://5.196.91.70:8000/api -t ghcr.io/${{ github.repository_owner }}/frontend:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/frontend:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            echo "Pull nouvelle image frontend"
            docker pull ghcr.io/${{ github.repository_owner }}/frontend:latest

            echo "Stop ancien container"
            docker stop frontend || true
            docker rm frontend || true

            echo "Start nouveau container"
            docker run -d \
              --name frontend \
              --network app_network \
              -p 3000:80 \
              ghcr.io/${{ github.repository_owner }}/frontend:latest